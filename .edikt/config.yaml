# edikt configuration
# This file configures edikt for the edikt project itself (dogfooding).

edikt_version: "0.6.0-dev"
base: docs

stack: []  # edikt is pure markdown, no language stack

paths:
  decisions: docs/architecture/decisions
  invariants: docs/architecture/invariants
  plans: docs/plans
  specs: docs/product/specs
  prds: docs/product/prds
  guidelines: docs/guidelines
  reports: docs/reports
  project-context: docs/project-context.md

rules: {}  # no rules needed for a markdown-only project

# Toggle optional behaviors. All default to true.
# The governance core (rules, compile, drift, review-governance) is always on.
features:
  auto-format: true        # format files after every edit (PostToolUse)
  session-summary: true    # git-aware "since your last session" on start
  signal-detection: true   # detect ADR/invariant candidates on stop
  plan-injection: true     # inject active plan phase on every prompt
  quality-gates: true      # block on critical findings from gate agents

artifacts:
  database:
    # Default database type for artifact generation.
    # edikt has no database — use auto (spec-level detection).
    default_type: auto

  fixtures:
    # Fixture format. yaml is portable — transform to your stack at implementation time.
    format: yaml

sdlc:
  commit-convention: conventional
  pr-template: false

# Gate severity thresholds per agent domain (ADR-023 §4).
# Supported values: critical | warning | info
#   critical (default) — block only on critical findings
#   warning            — block on warning and above
#   info               — block on any finding
# Override globally via EDIKT_GATE_SEVERITY_THRESHOLD env var.
gates:
  security: warning    # security findings warrant early attention
  dba: critical        # DB changes — block only on critical
  sre: warning
  architect: warning
  performance: critical
  api: warning
  default: critical    # for any agent not listed above
