schema_version: 1
topic: hooks
path: docs/architecture/decisions/ADR-019-security-override-of-byte-for-byte-hook-preservation.md
signals:
  - byte-for-byte
  - hook content
  - json wrapping
  - security rewrite
  - characterization fixtures
  - subagent-stop.sh
  - file-changed.sh
  - headless-ask.sh
  - stop-failure.sh
  - templates hooks
paths:
  - templates/hooks/**/*.sh
scope:
  - design
  - implementation
  - review
directives:
  - text: "For these four hooks only, security-driven rewrites may change user-visible message content AND JSON wrapping format in the same commit, with fresh fixtures generated by running the updated hook against its payload. (ref: ADR-019)"
    source_excerpt:
      line_start: 52
      line_end: 52
      quote: "ADR-014's byte-for-byte rule is narrowed by this ADR for exactly four hooks: `templates/hooks/subagent-stop.sh`, `templates/hooks/file-changed.sh`, `templates/hooks/headless-ask.sh`, `templates/hooks/stop-failure.sh`. For these four hooks only, security-driven rewrites may change user-visible message content AND JSON wrapping format in the same commit, with fresh fixtures generated by running the updated hook against its payload."
  - text: "No other hook may invoke this carve-out. (ref: ADR-019)"
    source_excerpt:
      line_start: 54
      line_end: 54
      quote: "No other hook may invoke this carve-out. Any future content change to a non-listed hook must follow ADR-014 unaltered (wrap first, content change separately)."
  - text: "Any future content change to a non-listed hook MUST follow ADR-014 unaltered (wrap first, content change separately). (ref: ADR-019)"
    source_excerpt:
      line_start: 54
      line_end: 54
      quote: "No other hook may invoke this carve-out. Any future content change to a non-listed hook must follow ADR-014 unaltered (wrap first, content change separately)."
  - text: "The carve-out MUST be justified only when the existing content violates INV-003 or INV-004. (ref: ADR-019)"
    source_excerpt:
      line_start: 56
      line_end: 56
      quote: "The carve-out is justified only when the existing content violates INV-003 or INV-004. Style rewrites, prose polish, or UX improvements do not qualify."
  - text: "Style rewrites, prose polish, or UX improvements MUST NOT qualify for the security carve-out of ADR-019. (ref: ADR-019)"
    source_excerpt:
      line_start: 56
      line_end: 56
      quote: "The carve-out is justified only when the existing content violates INV-003 or INV-004. Style rewrites, prose polish, or UX improvements do not qualify."
prohibitions:
  - text: "MUST NOT fully supersede ADR-014 — removes the byte-for-byte protection still valid for the majority of hooks and opens the door to content drift during routine migration work. (ref: ADR-019)"
    source_excerpt:
      line_start: 62
      line_end: 62
      quote: "- **Cons:** Removes a protection that is still valid for the majority of hooks. Opens the door to content drift during routine migration work."
    derived_from: rejected_option_full-supersession-of-adr-014
  - text: "MUST NOT land security rewrites as separate post-migration PRs — ships a known-Critical vulnerability between the wrapping PR and the security rewrite PR. (ref: ADR-019)"
    source_excerpt:
      line_start: 67
      line_end: 67
      quote: "- **Cons:** Ships a known-Critical vulnerability between the wrapping PR and the security rewrite PR. That's worse than a single well-reviewed PR that does both."
    derived_from: rejected_option_separate-prs-per-affected-hook
reminders:
  - "Before modifying any hook under templates/hooks/ → verify the hook is one of the four listed in ADR-019 before bundling content change with JSON-wrapping migration (ref: ADR-019)"
  - "Before regenerating fixtures for the four listed hooks → verify fixtures are generated by running the updated hook against its payload, not hand-authored (ref: ADR-019)"
  - "Before merging a hook change → verify git log -p templates/hooks/*.sh shows non-listed hooks have wrap-only diffs with no content changes (ref: ADR-019)"
verification:
  - "[ ] templates/hooks/subagent-stop.sh, file-changed.sh, headless-ask.sh, stop-failure.sh have been rewritten with fresh characterization fixtures per ADR-011's regen rule (ref: ADR-019)"
  - "[ ] No other hook under templates/hooks/ has a content change bundled with its JSON-wrapping migration — verify via git log -p templates/hooks/*.sh on the branch (ref: ADR-019)"
  - "[ ] Both ADR-014 and ADR-019 remain status: accepted with neither superseding the other (ref: ADR-019)"
