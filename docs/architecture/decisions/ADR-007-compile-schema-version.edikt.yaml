schema_version: 1
topic: compile
path: docs/architecture/decisions/ADR-007-compile-schema-version.md
signals:
  - compile schema version
  - compile_schema_version
  - compiled_by
  - compiled_at
  - edikt doctor
  - governance.md
  - commands gov compile.md
paths:
  - commands/gov/**/*.md
scope:
  - design
  - implementation
  - review
directives:
  - text: "The compile schema version MUST be a small integer, independent of edikt's marketing version, that identifies the output format contract of /edikt:gov:compile. (ref: ADR-007)"
    source_excerpt:
      line_start: 28
      line_end: 28
      quote: "Introduce a **compile schema version** — a small integer, independent of edikt's marketing version, that identifies the output format contract of `/edikt:gov:compile`."
  - text: "The schema version MUST be a constant declared at the top of `commands/gov/compile.md` and MUST only be bumped when the output structure changes in a way that old tooling cannot read. (ref: ADR-007)"
    source_excerpt:
      line_start: 53
      line_end: 53
      quote: "The schema version is a constant declared at the top of `commands/gov/compile.md` and only bumped when the output *structure* changes in a way that old tooling cannot read. Point releases that fix bugs, add prose to ADRs, or touch unrelated commands do **not** bump the schema."
  - text: "Point releases that fix bugs, add prose to ADRs, or touch unrelated commands MUST NOT bump the compile schema version. (ref: ADR-007)"
    source_excerpt:
      line_start: 53
      line_end: 53
      quote: "The schema version is a constant declared at the top of `commands/gov/compile.md` and only bumped when the output *structure* changes in a way that old tooling cannot read. Point releases that fix bugs, add prose to ADRs, or touch unrelated commands do **not** bump the schema."
  - text: "If `compile_schema_version` is missing, /edikt:doctor MAY treat governance as generated by v0.1.x and recommend /edikt:gov:compile to regenerate in v2 format. (ref: ADR-007)"
    source_excerpt:
      line_start: 57
      line_end: 57
      quote: "- If `compile_schema_version` is missing → governance was generated by v0.1.x. Recommend `/edikt:gov:compile` to regenerate in v2 format."
  - text: "If `compile_schema_version` is less than the current constant, /edikt:doctor MAY treat the output format as changed and recommend regeneration. (ref: ADR-007)"
    source_excerpt:
      line_start: 58
      line_end: 58
      quote: "- If `compile_schema_version` < current → output format has changed. Recommend regeneration."
  - text: "If `compile_schema_version` is greater than the current constant, /edikt:doctor MAY treat installed edikt as older than what produced this file and recommend upgrading edikt. (ref: ADR-007)"
    source_excerpt:
      line_start: 59
      line_end: 59
      quote: "- If `compile_schema_version` > current → installed edikt is older than what produced this file. Recommend upgrading edikt."
  - text: "`compiled_by` and `compiled_at` MUST remain in HTML comments and MUST NOT appear in YAML frontmatter — they are human diagnostics, not programmatic contracts. (ref: ADR-007)"
    source_excerpt:
      line_start: 45
      line_end: 46
      quote: "| `compiled_by` (HTML comment) | Human diagnostic — what edikt version last ran compile here? | Informational only. Not enforced. |\n| `compiled_at` (HTML comment) | Human diagnostic — when? | Informational only. Not enforced. |"
prohibitions: []
reminders: []
verification: []
