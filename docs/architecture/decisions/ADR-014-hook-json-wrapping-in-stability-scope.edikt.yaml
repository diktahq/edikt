    source_excerpt:
      line_start: 1
      line_end: 1
      quote: '`fixtures.yaml` §9.1 MUST document the resolution of the 3 ADR-011-removed fixture pairs: `pre-compact` permanently removed (hook deleted); `session-start-with-edikt` and `subagent-stop-critical` def'
  - text: 'Fixture expected outputs for migrated hooks MUST be regenerated by running the updated hook against its payload. NEVER hand-author expected outputs. (ref: ADR-014)'
    source_excerpt:
