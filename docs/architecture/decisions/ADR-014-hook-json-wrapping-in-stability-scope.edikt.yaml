  - text: 'Hook migration MUST preserve user-visible message content byte-for-byte inside the JSON wrapping. NEVER reword user-facing strings as part of the wrapping migration. Content changes are separate commits with separate fixtures. (ref: ADR-014)'
    source_excerpt:
      line_start: 1
      line_end: 1
