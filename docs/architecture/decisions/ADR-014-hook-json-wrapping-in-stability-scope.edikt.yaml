directives:
  - text: "All plaintext-emitting edikt hooks MUST emit JSON conforming to the Claude Code hook protocol by the v0.5.0 release. (ref: ADR-014)"
    source_excerpt:
      line_start: 67
      line_end: 69
      quote: "- All plaintext-emitting edikt hooks MUST emit JSON conforming to the Claude Code hook\n  protocol (`{\"systemMessage\": ...}`, `{\"additionalContext\": ...}`, `{\"continue\": ...}`,\n  `{\"decision\": ...}`) by the v0.5.0 release. The user-visible message text MUST be"
  - text: "The user-visible message text MUST be preserved byte-for-byte inside the wrapping ŌĆö migration is a transport change, not a content change. (ref: ADR-014)"
    source_excerpt:
      line_start: 69
      line_end: 71
      quote: "  `{\"decision\": ...}`) by the v0.5.0 release. The user-visible message text MUST be\n  preserved byte-for-byte inside the wrapping ŌĆö migration is a transport change, not a\n  content change."
  - text: "The characterization test gate (EDIKT_SKIP_HOOK_TESTS=1 opt-out) from ADR-011 MUST remain opt-out. (ref: ADR-014)"
    source_excerpt:
      line_start: 72
      line_end: 73
      quote: "- The characterization test gate (`EDIKT_SKIP_HOOK_TESTS=1` opt-out) from ADR-011 MUST\n  remain opt-out. ADR-011's test infrastructure decisions (opt-out polarity, `_runner.sh`"
  - text: "ADR-011's test infrastructure decisions (opt-out polarity, _runner.sh immutability, _staged_runner.sh extension, fixture _note rationale) MUST carry forward unchanged. (ref: ADR-014)"
    source_excerpt:
      line_start: 73
      line_end: 75
      quote: "  remain opt-out. ADR-011's test infrastructure decisions (opt-out polarity, `_runner.sh`\n  immutability, `_staged_runner.sh` extension, fixture `_note` rationale) carry forward\n  unchanged."
  - text: "When re-added, each fixture MUST document its verified_by command. (ref: ADR-014)"
    source_excerpt:
      line_start: 84
      line_end: 84
      quote: "  When re-added, each fixture MUST document its `verified_by` command. The v0.5.0"
  - text: "The v0.5.0 ship-gate MUST be the hook-level JSON migration plus fixtures.yaml ┬¦9.1 notes documenting the deferral rationale for the 2 pending pairs. (ref: ADR-014)"
    source_excerpt:
      line_start: 84
      line_end: 86
      quote: "  When re-added, each fixture MUST document its `verified_by` command. The v0.5.0\n  ship-gate is the hook-level JSON migration (┬¦14.1) plus fixtures.yaml ┬¦9.1 notes\n  documenting the deferral rationale for the 2 pending pairs."
  - text: "Fixture expected outputs for migrated hooks MUST be regenerated by running the updated hook against its payload. (ref: ADR-014)"
    source_excerpt:
      line_start: 87
      line_end: 88
      quote: "- Fixture expected outputs for migrated hooks MUST be regenerated by running the updated\n  hook against its payload (`cat payload.json | bash hook.sh`). Hand-authored expected"
  - text: "Hand-authored expected outputs MUST NOT be used ŌĆö they remain forbidden per ADR-011. (ref: ADR-014)"
    source_excerpt:
      line_start: 88
      line_end: 89
      quote: "  hook against its payload (`cat payload.json | bash hook.sh`). Hand-authored expected\n  outputs remain forbidden per ADR-011."
  - text: "Hook behavior refinements MUST each be covered by a characterization fixture pair before ship in v0.5.0. (ref: ADR-014)"
    source_excerpt:
      line_start: 90
      line_end: 94
      quote: "- Hook behavior refinements unblocked by lifting the v0.6.0 gate ŌĆö `pre-tool-use.sh`\n  `updatedInput` transformation, `task-created.sh` plan-phase tracking, and new hook\n  events (`SessionEnd`, `SubagentStart`, `TaskCompleted`, `WorktreeCreate`,\n  `WorktreeRemove`) ŌĆö are permissible in v0.5.0 provided each is covered by a\n  characterization fixture pair before ship."
  - text: "Migration MUST NOT change message content. (ref: ADR-014)"
    source_excerpt:
      line_start: 95
      line_end: 95
      quote: "- Migration MUST NOT change message content. If a user-facing string needs rewording,"
  - text: "If a user-facing string needs rewording, it MAY be addressed as a separate commit with a separate fixture update, not folded into the wrapping migration. (ref: ADR-014)"
    source_excerpt:
      line_start: 95
      line_end: 97
      quote: "- Migration MUST NOT change message content. If a user-facing string needs rewording,\n  that is a separate commit with a separate fixture update, not folded into the wrapping\n  migration."
prohibitions:
  - text: "MUST NOT leave edikt in a mixed state with some hooks emitting JSON and others emitting plaintext across a release cycle. (ref: ADR-014)"
    source_excerpt:
      line_start: 116
      line_end: 117
      quote: "- **Cons:** Leaves edikt in a mixed state (some hooks JSON, some plaintext) for a release\n  cycle ŌĆö worst of both worlds for test suite, documentation, and user expectations."
    derived_from: rejected_option_partial-migration
reminders:
  - "Before migrating a hook to JSON ŌåÆ verify the user-visible message is preserved byte-for-byte inside the JSON wrapping (ref: ADR-014)"
  - "Before re-adding a removed fixture pair ŌåÆ run the hook against the payload and capture actual output as the expected file ŌĆö never hand-author expected outputs (ref: ADR-014)"
  - "Before making content changes to hook messages ŌåÆ ensure it is a separate commit with a separate fixture update, not folded into the wrapping migration (ref: ADR-014)"
verification:
  - "[ ] All stdout-producing hooks (pre-tool-use, session-start, post-compact, subagent-stop, user-prompt-submit) produce valid JSON ŌĆö run each through python3 -c 'import json,sys; json.loads(sys.stdin.read())' (ref: ADR-014)"
  - "[ ] fixtures.yaml ┬¦9.1 documents resolution of the 3 removed pairs: pre-compact permanently removed; session-start-with-edikt and subagent-stop-critical deferred with explicit blocker notes (ref: ADR-014)"
  - "[ ] Hook test suite passes without EDIKT_SKIP_HOOK_TESTS=1 ŌĆö for t in test/unit/hooks/test_*.sh; do bash \"$t\"; done (ref: ADR-014)"
  - "[ ] No user-facing message content changes between pre- and post-migration fixtures ŌĆö git log -p test/expected/hook-outputs/ shows only JSON wrapping diffs (ref: ADR-014)"
  - "[ ] ADR-011 status reads 'Superseded by ADR-014' in both frontmatter and bolded Status line (ref: ADR-014)"
