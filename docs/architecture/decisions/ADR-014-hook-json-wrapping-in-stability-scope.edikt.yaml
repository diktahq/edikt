signals: []
directives:
  - text: 'Hook JSON-wrapping migration MUST land in v0.5.0. All plaintext-emitting edikt hooks MUST emit JSON conforming to the Claude Code hook protocol by the v0.5.0 release. (ref: ADR-014)'
    source_excerpt:
      line_start: 1
      line_end: 1
