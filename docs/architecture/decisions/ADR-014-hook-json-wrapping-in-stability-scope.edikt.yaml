      line_end: 1
      quote: 'Fixture expected outputs for migrated hooks MUST be regenerated by running the updated hook against its payload. NEVER hand-author expected outputs. (ref: ADR-014)'
  - text: 'New hook behavior refinements (`updatedInput` transforms, plan-phase tracking, new events `SessionEnd`/`SubagentStart`/`TaskCompleted`/`WorktreeCreate`/`WorktreeRemove`) are permissible in v0.5.0 provided each is covered by a characterization fixture pair before ship. (ref: ADR-014)'
    source_excerpt:
