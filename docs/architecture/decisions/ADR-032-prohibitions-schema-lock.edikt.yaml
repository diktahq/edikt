prohibitions:
  - text: "MUST NOT fold prohibitions into `directives[]` with a `kind` discriminator — `len()` no longer answers 'how many prohibitions' and the INV-005 byte-range guard cannot cleanly carve three managed regions without ad-hoc per-entry markers. (ref: ADR-032)"
    source_excerpt:
      line_start: 65
      line_end: 65
      quote: "- Cons: every consumer (comparator, render, benchmark, doctor) needs filter logic instead of direct field access; `len()` no longer answers \"how many prohibitions\"; INV-005 byte-range guard cannot cleanly carve the rendered output into three managed regions without ad-hoc per-entry markers; mechanical regression detection becomes a per-tuple analysis instead of a count comparison."
    derived_from: rejected_option_b
  - text: "MUST NOT attach prohibitions as a child `prohibits[]` array on a parent directive — prohibitions are synthesised from rejected `## Considered Options`, not from chosen directives, so there is no parent directive to attach them to. (ref: ADR-032)"
    source_excerpt:
      line_start: 72
      line_end: 72
      quote: "- Cons: prohibitions in v0.6.0 are synthesised from rejected `## Considered Options`, not from chosen directives — there's no parent directive to attach them to. The shape would require inventing a synthetic parent or duplicating provenance metadata."
    derived_from: rejected_option_c
  - text: "MUST NOT place prohibitions in a free-form annotation field — doing so defeats `additionalProperties: false` strictness, `KnownFields(true)` decoder safety, and every mechanical check. (ref: ADR-032)"
    source_excerpt:
      line_start: 79
      line_end: 79
      quote: "- Cons: defeats `additionalProperties: false` strictness; defeats `KnownFields(true)` decoder safety; defeats every mechanical check."
    derived_from: rejected_option_d
reminders:
  - "Before modifying the sidecar schema → verify `prohibitions[]` remains a separate top-level array in `templates/schemas/sidecar.v1.schema.json` (ref: ADR-032)"
  - "Before amending ADR-032 → verify compile UX feedback or benchmark drift data exists as explicit evidence (ref: ADR-032)"
  - "Before moving prohibitions inside `directives[]` → stop and create a new ADR amending ADR-032 instead (ref: ADR-032)"
