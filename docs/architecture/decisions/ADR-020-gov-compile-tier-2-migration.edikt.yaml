  - text: 'LLM invocations from `/edikt:gov:compile` are restricted to: (a) generating sentinel blocks for new artifacts that lack one, (b) hand-edit conflict interviews (when `source_hash` matches but `directives_hash` does not), (c) composing contradiction-warning wording from a mechanically-detected contradiction list. No other LLM calls are permitted during compile. (ref: ADR-020)'
