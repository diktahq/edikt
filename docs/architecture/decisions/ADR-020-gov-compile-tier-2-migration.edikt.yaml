  - text: 'Compile output MUST be byte-equal across runs for byte-equal input. Non-determinism (LLM drift, unsorted iteration, timestamp embedding in hashed content) is forbidden. CI MUST include a diff-equality test. (ref: ADR-020)'
    source_excerpt:
