  - text: '`/edikt:gov:compile --check` on 40 source documents MUST complete in under 2 seconds. Full regenerate on the same corpus MUST complete in under 5 seconds. No-op recompile (both hashes match) MUST exit in under 500 ms with zero LLM calls. (ref: ADR-020)'
