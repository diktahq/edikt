  - text: 'Deterministic transformations in `/edikt:gov:compile` (YAML parse, sentinel extraction, hash computation, three-list merge, topic grouping, template rendering, orphan detection) MUST run in `tools/edikt/` (tier-2 Python helper per ADR-015). NEVER keep them as LLM round-trips in `commands/gov/compile.md`. (ref: ADR-020)'
