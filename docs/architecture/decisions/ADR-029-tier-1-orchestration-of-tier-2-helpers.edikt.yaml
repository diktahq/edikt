      quote: "Other binary calls remain forbidden in tier-1. Adding a new orchestration verb to this list requires an ADR amending this one — the list is exhaustive, not illustrative."
  - text: "Each tier-1 command that invokes a tier-2 binary MUST document its failure-mode in command frontmatter. (ref: ADR-029)"
    source_excerpt:
      line_start: 71
      line_end: 71
      quote: "Each tier-1 command that invokes a tier-2 binary MUST document its failure-mode in command frontmatter:"
  - text: "Absent the `on_absent:` frontmatter field, the default MUST be `refuse-and-direct-user` (fail-closed). (ref: ADR-029)"
    source_excerpt:
      line_start: 76
      line_end: 76
      quote: "The choice is per-command and is a documented contract — users reading the command's frontmatter can predict its behavior under absence without running it. Absent the frontmatter field, the default is `refuse-and-direct-user` (fail-closed)."
  - text: "Tier-1 MUST install without tier-2. (ref: ADR-029)"
    source_excerpt:
      line_start: 80
      line_end: 80
      quote: "Tier-1 still installs without tier-2. `install.sh` does not install the Go binary; users get tier-1 markdown and nothing else by default. Helper install (including the `edikt` binary itself) is a separate explicit step. This ADR does not change that — it changes the runtime relationship between tier-1 commands and tier-2 binaries, not the install relationship."
  - text: "`install.sh` MUST NOT install the Go binary; users MUST get tier-1 markdown and nothing else by default. (ref: ADR-029)"
    source_excerpt:
