      quote: 'Tier-1 markdown MAY invoke only the enumerated tier-2 orchestration verbs: `verify`, `doctor`, `migrate`, `gov compile`, `install`, `upgrade`, `use`, `rollback`. Other binary calls remain forbidden in'
  - text: 'Tier-1 commands that invoke tier-2 binaries MUST declare `tier_2_dependency:` and `on_absent:` in command frontmatter. Valid `on_absent:` values are `skip-with-warning` and `refuse-and-direct-user`. Absent the field, the default is `refuse-and-direct-user`. (ref: ADR-029)'
