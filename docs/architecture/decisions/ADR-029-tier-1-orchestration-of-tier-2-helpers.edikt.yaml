prohibitions:
  - text: "MUST NOT allow tier-1 to call tier-2 freely with no contract — tier boundary becomes meaningless and tier-2 helpers must keep output formats stable forever to avoid breaking tier-1 callers. (ref: ADR-029)"
    source_excerpt:
      line_start: 109
      line_end: 109
      quote: "- **Cons:** Tier boundary becomes meaningless. Tier-2 helpers must keep output formats stable forever to avoid breaking tier-1 callers. The \"compile your decisions into automatic enforcement\" vision becomes a tangle of cross-tier coupling."
    derived_from: rejected_option_b
  - text: "MUST NOT implement orchestration verbs (such as verify) as tier-1 markdown commands — markdown cannot reliably execute shell commands with timeouts, capture per-criterion exit codes, and persist a structured report. (ref: ADR-029)"
    source_excerpt:
      line_start: 115
      line_end: 115
      quote: "- **Cons:** Markdown cannot reliably execute shell commands with timeouts, capture per-criterion exit codes, and persist a structured report. The verify runner is genuinely Tier-2 work; trying to do it in markdown reproduces every problem `tools/edikt/` was created to solve."
    derived_from: rejected_option_c
  - text: "MUST NOT route tier-1 to tier-2 calls through a Bash wrapper — the wrapper is itself a runtime dependency and the problem moves rather than disappearing. (ref: ADR-029)"
    source_excerpt:
      line_start: 121
      line_end: 121
      quote: "- **Cons:** Adds a layer of indirection that has to be installed, maintained, and kept in sync with the binary. The wrapper is itself a runtime dependency — the problem moves, it doesn't go away."
    derived_from: rejected_option_d
reminders:
  - "Before invoking a new `bin/edikt` subcommand from tier-1 markdown → verify the verb is in ADR-029 Rule 3's enumerated list (ref: ADR-029)"
  - "Before adding a tier-1 command that calls a tier-2 binary → verify it declares `tier_2_dependency:` and `on_absent:` in its frontmatter (ref: ADR-029)"
  - "Before merging a tier-1 command that invokes tier-2 → verify absence-detection emits an actionable error citing the helper by name (ref: ADR-029)"
