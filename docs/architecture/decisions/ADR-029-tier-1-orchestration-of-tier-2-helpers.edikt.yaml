directives:
  - text: "Tier-1 markdown commands MAY invoke tier-2 binaries via `bin/edikt <subcommand>` for orchestration purposes, provided the four rules below all hold. (ref: ADR-029)"
    source_excerpt:
      line_start: 42
      line_end: 42
      quote: "**Tier-1 markdown commands MAY invoke tier-2 binaries via `bin/edikt <subcommand>` for orchestration purposes, provided the four rules below all hold. The tier boundary is preserved structurally — tier-1 still installs without tier-2 — but the tier boundary at runtime becomes a contract about exit codes, not a prohibition on invocation.**"
  - text: "A tier-1 markdown command that invokes `bin/edikt <subcommand>` MUST detect absence of the binary on PATH before invocation and emit a clear actionable error directing the user to `edikt install <helper>` (or to the documented install path for the helper in question). (ref: ADR-029)"
    source_excerpt:
      line_start: 46
      line_end: 46
      quote: "A tier-1 markdown command that invokes `bin/edikt <subcommand>` MUST detect absence of the binary on PATH before invocation and emit a clear actionable error directing the user to `edikt install <helper>` (or to the documented install path for the helper in question). The absence-detection check MUST cite the helper by name in the error so the user knows what to install."
  - text: "The absence-detection check MUST cite the helper by name in the error so the user knows what to install. (ref: ADR-029)"
    source_excerpt:
      line_start: 46
      line_end: 46
      quote: "A tier-1 markdown command that invokes `bin/edikt <subcommand>` MUST detect absence of the binary on PATH before invocation and emit a clear actionable error directing the user to `edikt install <helper>` (or to the documented install path for the helper in question). The absence-detection check MUST cite the helper by name in the error so the user knows what to install."
  - text: "The markdown command MUST NOT depend on the binary's output SHAPE. (ref: ADR-029)"
    source_excerpt:
      line_start: 50
      line_end: 50
      quote: "The markdown command MUST NOT depend on the binary's output SHAPE. Output may be displayed verbatim to the user (passthrough is fine), but parsing — extracting fields, splitting on whitespace, regex-matching against the binary's output — is forbidden. The contract surface between tier-1 and tier-2 is the exit code. Output drift in tier-2 is allowed; behavior coupling on output shape is not."
  - text: "Output may be displayed verbatim to the user (passthrough is fine), but parsing — extracting fields, splitting on whitespace, regex-matching against the binary's output — MUST NOT be done. (ref: ADR-029)"
    source_excerpt:
      line_start: 50
      line_end: 50
      quote: "The markdown command MUST NOT depend on the binary's output SHAPE. Output may be displayed verbatim to the user (passthrough is fine), but parsing — extracting fields, splitting on whitespace, regex-matching against the binary's output — is forbidden. The contract surface between tier-1 and tier-2 is the exit code. Output drift in tier-2 is allowed; behavior coupling on output shape is not."
  - text: "Other binary calls MUST remain forbidden in tier-1. (ref: ADR-029)"
    source_excerpt:
      line_start: 67
      line_end: 67
      quote: "Other binary calls remain forbidden in tier-1. Adding a new orchestration verb to this list requires an ADR amending this one — the list is exhaustive, not illustrative."
  - text: "Adding a new orchestration verb to this list MUST require an ADR amending ADR-029 — the list is exhaustive, not illustrative. (ref: ADR-029)"
    source_excerpt:
      line_start: 67
