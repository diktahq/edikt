      quote: 'Tier-1 markdown commands MAY invoke tier-2 binaries via `bin/edikt <subcommand>` for orchestration purposes, but only under the four rules of ADR-029. (ref: ADR-029)'
  - text: 'A tier-1 markdown command that invokes `bin/edikt <subcommand>` MUST detect absence of the binary on PATH before invocation and emit an actionable error citing `edikt install <helper>` by name. (ref: ADR-029)'
    source_excerpt:
