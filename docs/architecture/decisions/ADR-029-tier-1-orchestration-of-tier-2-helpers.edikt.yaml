  - text: 'Tier-1 markdown commands MUST NOT parse the output SHAPE of any tier-2 binary. The contract surface between tier-1 and tier-2 is the exit code only; output may be displayed verbatim but never read programmatically. (ref: ADR-029)'
    source_excerpt:
      line_start: 1
      line_end: 1
      quote: Tier-1 markdown commands MUST NOT parse the output SHAPE of any tier-2 binary. The contract surface between tier-1 and tier-2 is the exit code only; output may be displayed verbatim but never read pro
  - text: 'Tier-1 markdown MAY invoke only the enumerated tier-2 orchestration verbs: `verify`, `doctor`, `migrate`, `gov compile`, `install`, `upgrade`, `use`, `rollback`. Other binary calls remain forbidden in tier-1; adding a verb to this list requires an ADR amending ADR-029. (ref: ADR-029)'
    source_excerpt:
