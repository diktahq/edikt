  - text: 'The `permissions.allow` list MUST include edikt''s operational tools (git, gh, pytest, npm test, `./test/run.sh`, `./test/test-e2e.sh`, make test, uv, ruff, WebFetch(https://**), WebSearch). (ref: ADR-017)'
    source_excerpt:
