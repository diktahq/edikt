  - text: 'The plan harness MUST reject PASS unless every criterion whose id references a shell command has `evidence_type: "test_run"`. Mismatch forces the verdict to BLOCKED with a listed reason. (ref: ADR-018)'
    source_excerpt:
      line_start: 1
      line_end: 1
