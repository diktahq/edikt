      quote: "3. **The evaluator MUST NOT return PASS when required verification steps could not execute.** If an acceptance criterion requires Bash execution and Bash is denied, the verdict for that criterion is BLOCKED. Read-only inspection does not substitute for runtime verification. Overall verdict is BLOCKED whenever any criterion is BLOCKED."
  - text: "`commands/sdlc/plan.md` MUST attempt headless first when `evaluator.mode: headless`. (ref: ADR-010)"
    source_excerpt:
      line_start: 51
      line_end: 51
      quote: "4. **`commands/sdlc/plan.md` MUST attempt headless first when `evaluator.mode: headless`.** On headless failure (spawn error, non-zero exit, auth error, timeout), it MUST fall back to subagent mode and emit a visible warning banner naming the failure reason and the remediation."
  - text: "On headless failure (spawn error, non-zero exit, auth error, timeout), `commands/sdlc/plan.md` MUST fall back to subagent mode and emit a visible warning banner naming the failure reason and the remediation. (ref: ADR-010)"
    source_excerpt:
