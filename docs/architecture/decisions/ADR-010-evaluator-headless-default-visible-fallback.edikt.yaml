  - text: "Default mode MUST be headless. `.edikt/config.yaml` ships with `evaluator.mode: headless` as the default and recommended value. (ref: ADR-010)"
    source_excerpt:
      line_start: 45
      line_end: 45
      quote: "1. **Default mode MUST be headless.** `.edikt/config.yaml` ships with `evaluator.mode: headless` as the default and recommended value. `subagent` remains a supported value for environments where headless cannot run."
  - text: "Both `templates/agents/evaluator.md` (subagent) and `templates/agents/evaluator-headless.md` (headless) MUST declare BLOCKED as a valid per-criterion verdict and a valid overall verdict. (ref: ADR-010)"
    source_excerpt:
      line_start: 47
      line_end: 47
      quote: "2. **The evaluator agent template MUST support a BLOCKED verdict.** Both `templates/agents/evaluator.md` (subagent) and `templates/agents/evaluator-headless.md` (headless) MUST declare BLOCKED as a valid per-criterion verdict and a valid overall verdict. BLOCKED means \"evaluator could not verify this criterion due to a missing capability (Bash denied, test runner missing, external dependency unavailable).\""
  - text: "The evaluator MUST NOT return PASS when required verification steps could not execute. (ref: ADR-010)"
    source_excerpt:
      line_start: 49
      line_end: 49
      quote: "3. **The evaluator MUST NOT return PASS when required verification steps could not execute.** If an acceptance criterion requires Bash execution and Bash is denied, the verdict for that criterion is BLOCKED. Read-only inspection does not substitute for runtime verification. Overall verdict is BLOCKED whenever any criterion is BLOCKED."
  - text: "If an acceptance criterion requires Bash execution and Bash is denied, the verdict for that criterion MAY be BLOCKED. (ref: ADR-010)"
    source_excerpt:
      line_start: 49
      line_end: 49
      quote: "3. **The evaluator MUST NOT return PASS when required verification steps could not execute.** If an acceptance criterion requires Bash execution and Bash is denied, the verdict for that criterion is BLOCKED. Read-only inspection does not substitute for runtime verification. Overall verdict is BLOCKED whenever any criterion is BLOCKED."
  - text: "Read-only inspection MUST NOT substitute for runtime verification. (ref: ADR-010)"
    source_excerpt:
