      quote: "6. **The subagent evaluator template MUST self-check before claiming verdicts.** Before evaluating any criterion that requires Bash, it MUST probe whether Bash is available. If denied, it MUST return BLOCKED for that criterion with an explicit recovery hint (\"re-run with `evaluator.mode: headless` or via `/edikt:sdlc:plan`\")."
  - text: "`/edikt:doctor` MUST probe the evaluator path: verify `claude` is on PATH, headless probe succeeds, configured evaluator template exists, and `evaluator.mode` is set explicitly (not inferred default). (ref: ADR-010)"
    source_excerpt:
      line_start: 57
      line_end: 57
      quote: "7. **`/edikt:doctor` MUST probe the evaluator path.** It MUST verify `claude` is on PATH, that a headless probe (`claude -p \"echo ok\"`) succeeds, that the configured evaluator template exists, and that `evaluator.mode` is set explicitly (not inferred default). Failures MUST surface with actionable remediation."
  - text: "Failures in evaluator path probing MUST surface with actionable remediation. (ref: ADR-010)"
    source_excerpt:
      line_start: 57
      line_end: 57
      quote: "7. **`/edikt:doctor` MUST probe the evaluator path.** It MUST verify `claude` is on PATH, that a headless probe (`claude -p \"echo ok\"`) succeeds, that the configured evaluator template exists, and that `evaluator.mode` is set explicitly (not inferred default). Failures MUST surface with actionable remediation."
  - text: "Every evaluator failure mode MUST produce user-visible output with the failure reason, the criterion affected (where applicable), and the one-line command the user can run to recover. (ref: ADR-010)"
    source_excerpt:
      line_start: 59
      line_end: 59
      quote: "8. **Every evaluator failure mode MUST produce user-visible output.** Headless spawn failure, auth failure, Bash denial, BLOCKED verdicts, and full evaluation failure each have a defined output block with the failure reason, the criterion affected (where applicable), and the one-line command the user can run to recover."
prohibitions:
  - text: "MUST NOT collapse to headless-only (remove subagent mode entirely) — strands users in environments where headless cannot run. (ref: ADR-010)"
    source_excerpt:
      line_start: 66
      line_end: 66
      quote: "- **Cons:** Headless has real environmental failure modes (missing CLI, expired auth, subprocess restrictions, MCP dependencies). Users in those environments would have no working evaluator at all."
    derived_from: rejected_option_collapse-to-headless-only
  - text: "MUST NOT keep both evaluator modes with only a user-facing config switch and no automatic fallback or BLOCKED verdict — this preserves silent-PASS failures. (ref: ADR-010)"
    source_excerpt:
      line_start: 72
      line_end: 72
      quote: "- **Cons:** Preserves every problem that produced this ADR. The evaluator can still silently PASS. Users can still bypass config by invoking the agent directly."
    derived_from: rejected_option_keep-both-modes-config-switch
  - text: "MUST NOT allow the evaluator to be invoked directly (bypassing the orchestrator config) without enforcing the BLOCKED-verdict contract. (ref: ADR-010)"
    source_excerpt:
      line_start: 72
      line_end: 72
      quote: "- **Cons:** Preserves every problem that produced this ADR. The evaluator can still silently PASS. Users can still bypass config by invoking the agent directly."
    derived_from: rejected_option_keep-both-modes-config-switch
reminders:
