      quote: "4. **`commands/sdlc/plan.md` MUST attempt headless first when `evaluator.mode: headless`.** On headless failure (spawn error, non-zero exit, auth error, timeout), it MUST fall back to subagent mode and emit a visible warning banner naming the failure reason and the remediation."
  - text: "`commands/sdlc/plan.md` MUST parse and surface BLOCKED verdicts in the phase evaluation output. (ref: ADR-010)"
    source_excerpt:
      line_start: 53
      line_end: 53
      quote: "5. **`commands/sdlc/plan.md` MUST parse and surface BLOCKED verdicts in the phase evaluation output.** The progress table MUST gain a `blocked` state in addition to the existing `pass`/`fail`/`evaluating` states. A phase with BLOCKED verdicts is NOT considered verified and MUST NOT be marked complete."
