directives:
  - text: "The evaluator MUST run headless by default. (ref: ADR-010)"
    source_excerpt:
      line_start: 41
      line_end: 41
      quote: "edikt adopts Option 3. The evaluator MUST run headless by default. The evaluator MAY fall back to subagent mode only when headless fails, and MUST emit a visible warning banner when it does. The evaluator MUST return a BLOCKED verdict — never PASS — when it cannot execute a verification step required by an acceptance criterion."
