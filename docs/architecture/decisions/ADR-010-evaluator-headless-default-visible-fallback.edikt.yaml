  - text: "The subagent evaluator template MUST self-check before claiming verdicts: before evaluating any criterion that requires Bash, it MUST probe whether Bash is available. (ref: ADR-010)"
    source_excerpt:
      line_start: 55
      line_end: 55
      quote: "6. **The subagent evaluator template MUST self-check before claiming verdicts.** Before evaluating any criterion that requires Bash, it MUST probe whether Bash is available. If denied, it MUST return BLOCKED for that criterion with an explicit recovery hint (\"re-run with `evaluator.mode: headless` or via `/edikt:sdlc:plan`\")."
  - text: "If Bash is denied, the subagent evaluator MUST return BLOCKED for that criterion with an explicit recovery hint. (ref: ADR-010)"
    source_excerpt:
      line_start: 55
