schema_version: 1
topic: compile
path: docs/architecture/decisions/ADR-028-two-phase-compile-resync-merge.md
signals:
  - two-phase compile
  - phase a resync
  - phase b merge
  - stale sidecar
  - compile.lock
  - compile-errors.log
  - gov compile
  - check mode
  - deterministic merge
  - subagent concurrency
  - progress ui
  - topic files
