directives:
  - text: "A single SHA256SUMS file MUST be shipped as a GitHub Release asset containing one line per tarball in the standard sha256sum format. (ref: ADR-013)"
    source_excerpt:
      line_start: 60
      line_end: 62
      quote: "We will ship a single `SHA256SUMS` file as a GitHub Release asset. The file\ncontains one line per tarball in the standard `sha256sum` format:"
  - text: "`bin/edikt install` MUST fetch `SHA256SUMS` alongside the payload tarball and verify the launcher tarball's hash before extracting. (ref: ADR-013)"
    source_excerpt:
      line_start: 70
      line_end: 72
      quote: "`bin/edikt install` MUST fetch `SHA256SUMS` alongside the payload tarball and\nverify the launcher tarball's hash before extracting. The verification uses the\nexisting `verify_against_sidecar()` function, which greps the `SHA256SUMS`"
  - text: "Signing (GPG / Sigstore / cosign) MUST be deferred to a future ADR and MUST NOT be bundled with the checksum format release. (ref: ADR-013)"
    source_excerpt:
      line_start: 75
      line_end: 75
      quote: "Signing (GPG / Sigstore / cosign) is deferred to a future ADR. The `SHA256SUMS`"
prohibitions:
  - text: "MUST NOT use per-file .sha256 sidecars (e.g. edikt-v<ver>.tar.gz.sha256) — verify_against_sidecar() would need to know the sidecar filename and release asset count grows linearly with artifact count. (ref: ADR-013)"
    source_excerpt:
      line_start: 84
      line_end: 85
      quote: "- **Cons:** Two separate files to manage; no standard naming convention; `verify_against_sidecar()` would need to know the sidecar filename; release asset count grows linearly with artifact count"
    derived_from: "rejected_option_per-file-sidecars"
  - text: "MUST NOT embed checksums inline in the GitHub Release body — not machine-readable and not suitable for automated pipeline consumption. (ref: ADR-013)"
    source_excerpt:
      line_start: 89
      line_end: 90
      quote: "- **Cons:** Not machine-readable; breaks automated verification; not supported by Homebrew formula verification\n- **Rejected because:** Not suitable for automated pipeline consumption"
    derived_from: "rejected_option_inline-release-body"
reminders:
  - "Before modifying the release workflow → verify SHA256SUMS is generated by sha256sum and uploaded as a release asset alongside both tarballs (ref: ADR-013)"
  - "Before modifying bin/edikt install → verify it fetches SHA256SUMS and calls verify_against_sidecar() before extracting the payload tarball (ref: ADR-013)"
verification:
  - "[ ] test/integration/release/test_tarball_contents.sh verifies SHA256SUMS contains both tarball filenames and each hash is 64 hex characters (ref: ADR-013)"
  - "[ ] bin/edikt install fetches and verifies against SHA256SUMS via existing verify_against_sidecar path (ref: ADR-013)"
  - "[ ] .github/workflows/release.yml uploads SHA256SUMS as a release asset alongside the two tarballs (ref: ADR-013)"
