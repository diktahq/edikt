asyncapi: "2.6.0"
info:
  title: "Users Events"
  version: "0.1.0"
channels:
  user.created:
    publish:
      operationId: UserCreatedPublished
      summary: "Emitted when a new user is created"
      message:
        name: UserCreated
        payload:
          type: object
          required: [user_id, email, occurred_at]
          properties:
            user_id:
              type: string
              format: uuid
              description: "ID of the created user"
            email:
              type: string
              description: "Email of the created user"
            occurred_at:
              type: string
              format: date-time
              description: "Timestamp of the event"
    x-producer: "users-service"
    x-consumers:
      - "notifications-service"
    x-ordering: "UNORDERED"
    x-idempotency: "consumer deduplicates on user_id"
