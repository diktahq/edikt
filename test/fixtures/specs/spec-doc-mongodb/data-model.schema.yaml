$schema: "https://json-schema.org/draft/07/schema#"
collection: "user_profiles"
title: "UserProfile"
type: object
required:
  - email
  - name
properties:
  _id:
    type: string
    description: "MongoDB ObjectId"
  email:
    type: string
    description: "User email address"
  name:
    type: string
    description: "Display name"
  metadata:
    type: object
    description: "Embedded user preferences and settings"
    properties:
      theme:
        type: string
      locale:
        type: string
indexes:
  - fields: [email]
    unique: true
    reason: "Unique lookup by email"
  - fields: [name]
    unique: false
    reason: "Search by display name"
