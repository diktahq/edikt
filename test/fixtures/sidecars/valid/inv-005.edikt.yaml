      quote: "Managed markdown regions are guarded by byte-range overlap checks on the resolved file. Regex matching over old_string or new_string is forbidden — it does not detect every overlap class."
  - text: "Edits that would overlap a managed region MUST be blocked unless an allowlisted bypass signal is set (EDIKT_COMPILE_IN_PROGRESS or EDIKT_MIGRATION_IN_PROGRESS). (ref: INV-005)"
    source_excerpt:
      line_start: 31
      line_end: 33
      quote: "Any edit whose byte range overlaps a managed region MUST be blocked unless an allowlisted bypass signal is set. Currently allowlisted: EDIKT_COMPILE_IN_PROGRESS=1 and EDIKT_MIGRATION_IN_PROGRESS=1."
