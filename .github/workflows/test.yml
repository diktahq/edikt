name: test

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - "v*"

# Cancel in-progress runs for the same ref — prevents parallel PRs from
# queueing and consuming runner minutes unnecessarily.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Layers 1 + 3: unit tests + sandbox (every PR, no API key) ──────────────
  unit-and-sandbox:
    name: Unit + sandbox (Layers 1 & 3)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq rsync
          python3 -m pip install --quiet pytest pytest-asyncio pyyaml

      - name: INV-003 lint — hooks must not shell-interpolate JSON
        run: |
          # Catch double-quoted echo/printf that opens a JSON object — these can
          # interpolate shell variables into JSON without quoting. Single-quoted
          # static literals (echo '{"continue": true}') are safe and excluded.
          # Safe JSON emission uses python3 json.dumps with argv (INV-003).
          if grep -rE 'echo "\{|printf "\{' templates/hooks/*.sh install.sh 2>/dev/null; then
            echo "FAIL: double-quoted shell-interpolated JSON found in hooks or install.sh (INV-003)"
            exit 1
          fi
          echo "OK: no double-quoted shell-interpolated JSON in hooks or install.sh"

      - name: INV-008 lint — no branch-tracking install URLs in user-facing docs
        run: |
          # Reject raw.githubusercontent.com/.*/main/ and releases/latest/download/
          # in README and website/ (user-facing). node_modules excluded.
          if grep -rE "raw\.githubusercontent\.com/[^/]+/[^/]+/main/|releases/latest/download/" \
               README.md website/ \
               --include="*.md" --include="*.yml" --include="*.yaml" \
               --exclude-dir=".vitepress" --exclude-dir="node_modules" 2>/dev/null; then
            echo "FAIL: branch-tracking install URL found in user-facing docs (INV-008)"
            exit 1
          fi
          echo "OK: no branch-tracking URLs in user-facing docs"

      - name: Run test suite (SKIP_INTEGRATION=1)
        run: bash test/run.sh
        env:
          SKIP_INTEGRATION: "1"
          # Hook characterization tests run by default (Phase 11b).
          # No EDIKT_SKIP_HOOK_TESTS needed — they are opt-out, not opt-in.

  # ─── Governance compile quality gate ─────────────────────────────────────────
  governance-quality:
    name: Go compile quality (golden-file test)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/gov-compile/go.mod
          cache-dependency-path: tools/gov-compile/go.sum

      - name: gov compile golden-file test
        run: |
          cd tools/gov-compile
          go test ./cmd/gov -run TestCompileGolden -timeout=60s -v

  # ─── Layer 2: Agent SDK integration tests (tag push only, needs API) ─────────
  integration:
    name: SDK integration (Layer 2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref_type == 'tag'
    needs: unit-and-sandbox

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          cd test/integration
          pip install claude-agent-sdk==0.1.59 pytest pytest-asyncio pyyaml

      - name: Run SDK integration tests
        run: cd test/integration && pytest -v
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Layer 2 uses the claude CLI bundled with claude-agent-sdk.
          # ANTHROPIC_API_KEY is the CI/headless fallback per ADR-012.
